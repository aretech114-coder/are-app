name: Deploy Edge Functions

on:
  push:
    branches: [develop, main]
    paths:
      - 'supabase/functions/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # LOGIQUE DE LIEN DYNAMIQUE : On choisit le projet selon la branche
      - name: Link Supabase Project
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            supabase link --project-ref ${{ secrets.PRODUCTION_PROJECT_ID }}
          else
            supabase link --project-ref ${{ secrets.STAGING_PROJECT_ID }}
          fi
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy all functions
        run: |
          for f in supabase/functions/*/; do
            name=$(basename $f)
            echo "Deploying function: $name"
            supabase functions deploy "$name" --no-verify-jwt
          done
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
