name: Deploy Edge Functions

on:
  push:
    branches: [develop, main]
    paths:
      - 'supabase/functions/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link & Deploy Functions
        run: |
          # 1. Sélection de l'ID selon votre nomenclature exacte
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            PROJECT_ID=${{ secrets.PRODUCTION_PROJECT_ID }}
            echo "Cible détectée : PRODUCTION"
          else
            # Pour la branche develop, on utilise le projet nommé 'Supabase'
            PROJECT_ID=${{ secrets.SUPABASE_PROJECT_ID }}
            echo "Cible détectée : SUPABASE (Staging/Develop)"
          fi

          # 2. Vérification que le secret n'est pas vide
          if [ -z "$PROJECT_ID" ]; then
            echo "ERREUR : Le Secret Project ID est vide. Vérifiez vos GitHub Secrets."
            exit 1
          fi

          # 3. Liaison au projet spécifique
          supabase link --project-ref $PROJECT_ID
          
          # 4. Déploiement automatique de toutes les fonctions
          for f in supabase/functions/*/; do
            if [ -f "${f}index.ts" ]; then
              func_name=$(basename $f)
              echo "Déploiement de la fonction : $func_name"
              supabase functions deploy "$func_name" --no-verify-jwt
            fi
          done
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}