name: Deploy Edge Functions

on:
  push:
    branches: [develop, main]
    paths:
      - 'supabase/functions/**'

jobs:
  deploy-staging:
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link staging project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy functions to staging
        run: |
          supabase functions deploy create-user --no-verify-jwt
          supabase functions deploy update-user --no-verify-jwt
          supabase functions deploy delete-user --no-verify-jwt
          supabase functions deploy manage-roles --no-verify-jwt
          supabase functions deploy sla-checker --no-verify-jwt
          supabase functions deploy ai-assistant --no-verify-jwt
          supabase functions deploy sync-users --no-verify-jwt
          supabase functions deploy impersonate-user --no-verify-jwt
          supabase functions deploy send-notification-email --no-verify-jwt
          supabase functions deploy api-public --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  deploy-production:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link production project
        run: supabase link --project-ref ${{ secrets.PRODUCTION_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy functions to production
        run: |
          supabase functions deploy create-user --no-verify-jwt
          supabase functions deploy update-user --no-verify-jwt
          supabase functions deploy delete-user --no-verify-jwt
          supabase functions deploy manage-roles --no-verify-jwt
          supabase functions deploy sla-checker --no-verify-jwt
          supabase functions deploy ai-assistant --no-verify-jwt
          supabase functions deploy sync-users --no-verify-jwt
          supabase functions deploy impersonate-user --no-verify-jwt
          supabase functions deploy send-notification-email --no-verify-jwt
          supabase functions deploy api-public --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
